name: MyMusic
options:
  bundleIdPrefix: com.noam
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_BITCODE: NO
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MyMusic:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MyMusic
    resources:
      - path: MyMusic/Resources/Assets.xcassets
    info:
      path: MyMusic/Resources/Info.plist
      properties:
        CFBundleName: My Music
        CFBundleDisplayName: My Music
        CFBundleIdentifier: com.noam.mymusic
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSupportsMultipleScenes: true
        UILaunchScreen: {}
        UISceneConfigurations:
          CPTemplateApplicationSceneSessionRoleApplication:
            - UISceneClassName: CPTemplateApplicationScene
              UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).CarPlaySceneDelegate
              UISceneConfigurationName: CarPlay Configuration
        NSAppleMusicUsageDescription: My Music needs access to play your music files.
        UIBackgroundModes:
          - audio
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: Audio Files
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.audio
              - public.mp3
              - com.apple.m4a-audio
              - org.xiph.flac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noam.mymusic
        PRODUCT_NAME: "My Music"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: MyMusic/MyMusic.entitlements
